services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-pw}-web
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ../:/var/www/html:cached
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    restart: unless-stopped

  db:
    image: mariadb:10.6
    container_name: ${COMPOSE_PROJECT_NAME:-pw}-db
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-pw_dev}
      MYSQL_USER: ${DB_USER:-pw_user}
      MYSQL_PASSWORD: ${DB_PASS:-pw_password}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: ${COMPOSE_PROJECT_NAME:-pw}-adminer
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
